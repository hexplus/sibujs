# .github/workflows/ci.yml
on:
    pull_request:
    workflow_dispatch:

jobs:
    ci:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version: 20
            - run: npm install
            - run: npm run lint
            - run: npm run build
            - run: npm run test
